<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    a.link-style {
      display: inline-block;
      font-size: 15px;
      color: blue;
      transition: font-size 0.2s ease;
    }
    a.link-style:hover {
      font-size: 22px;
      color: red;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>CSS Example</h1>
  <p>This is a paragraph <a class="link-style" href="#">Link one</a></p>
  <p>This is another paragraph. <a class="link-style" href="#">Link two</a></p>
  <p>This is yet another paragraph. <a class="link-style" href="#">Link three</a></p>
</body>
</html>
